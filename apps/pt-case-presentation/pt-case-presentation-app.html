<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PT / OT Case Presentation App</title>
  <style>
    :root {
      --bg: #f5efe4;
      --panel: rgba(255, 251, 245, 0.92);
      --panel-strong: #fffdf8;
      --ink: #1f1a17;
      --muted: #665d54;
      --line: rgba(84, 60, 40, 0.16);
      --accent: #b3472f;
      --accent-deep: #7f2f1f;
      --accent-soft: #f3d7c6;
      --shadow: 0 18px 48px rgba(68, 42, 24, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(179, 71, 47, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139, 123, 88, 0.16), transparent 32%),
        linear-gradient(135deg, #f7f1e7 0%, #f0e4d2 42%, #efe8db 100%);
      min-height: 100vh;
      transition: background 220ms ease, color 220ms ease;
    }

    body[data-discipline="ot"] {
      --bg: #eef2eb;
      --panel: rgba(252, 255, 249, 0.92);
      --panel-strong: #fdfffb;
      --ink: #1d201c;
      --muted: #5d665b;
      --line: rgba(62, 83, 58, 0.14);
      --accent: #4c7a58;
      --accent-deep: #31523a;
      --accent-soft: #dbe8d9;
      --shadow: 0 18px 48px rgba(48, 73, 45, 0.12);
      background:
        radial-gradient(circle at top left, rgba(76, 122, 88, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(118, 141, 98, 0.14), transparent 30%),
        linear-gradient(135deg, #f4f8ef 0%, #e9f0e4 42%, #eef2eb 100%);
    }

    .shell {
      width: min(1200px, calc(100% - 32px));
      margin: 28px auto 40px;
    }

    .hero {
      padding: 28px;
      border-radius: calc(var(--radius) + 6px);
      background: linear-gradient(140deg, rgba(255, 250, 244, 0.9), rgba(244, 228, 208, 0.92));
      box-shadow: var(--shadow);
      border: 1px solid rgba(126, 91, 60, 0.12);
      transition: background 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    body[data-discipline="ot"] .hero {
      background: linear-gradient(140deg, rgba(251, 255, 248, 0.94), rgba(224, 237, 221, 0.92));
      border-color: rgba(72, 98, 67, 0.12);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 8px 0 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(320px, 1.05fr) minmax(320px, 0.95fr);
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: background 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    .panel {
      padding: 22px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .switch-stack {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .mode-switch,
    .discipline-switch {
      display: grid;
      gap: 10px;
    }

    .mode-switch {
      grid-template-columns: 1fr 1fr;
    }

    .discipline-switch {
      grid-template-columns: 1fr 1fr;
    }

    .mode-switch button,
    .discipline-switch button,
    .action-row button,
    .output-actions button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .mode-switch button,
    .discipline-switch button {
      background: #efe4d4;
      color: var(--ink);
    }

    body[data-discipline="ot"] .mode-switch button,
    body[data-discipline="ot"] .discipline-switch button {
      background: #e3eadf;
    }

    .mode-switch button.active,
    .discipline-switch button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      box-shadow: 0 14px 24px rgba(127, 47, 31, 0.22);
    }

    body[data-discipline="ot"] .mode-switch button.active,
    body[data-discipline="ot"] .discipline-switch button.active {
      box-shadow: 0 14px 24px rgba(49, 82, 58, 0.22);
    }

    .mode-switch button:hover,
    .discipline-switch button:hover,
    .action-row button:hover,
    .output-actions button:hover {
      transform: translateY(-1px);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.two {
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(91, 65, 42, 0.18);
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 252, 247, 0.92);
      transition: border-color 220ms ease, background 220ms ease;
    }

    body[data-discipline="ot"] input,
    body[data-discipline="ot"] textarea {
      border-color: rgba(65, 88, 60, 0.18);
      background: rgba(254, 255, 252, 0.92);
    }

    textarea {
      resize: vertical;
      min-height: 92px;
      line-height: 1.55;
    }

    .block {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px dashed rgba(91, 65, 42, 0.22);
    }

    body[data-discipline="ot"] .block {
      border-top-color: rgba(65, 88, 60, 0.22);
    }

    .action-row,
    .output-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .action-row {
      margin-top: 18px;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      box-shadow: 0 14px 28px rgba(127, 47, 31, 0.2);
    }

    body[data-discipline="ot"] .primary {
      box-shadow: 0 14px 28px rgba(49, 82, 58, 0.2);
    }

    .secondary {
      background: #efe4d4;
      color: var(--ink);
    }

    body[data-discipline="ot"] .secondary {
      background: #e3eadf;
    }

    .ghost {
      background: transparent;
      color: var(--accent-deep);
      border: 1px solid rgba(127, 47, 31, 0.16);
    }

    body[data-discipline="ot"] .ghost {
      border-color: rgba(49, 82, 58, 0.16);
    }

    .output-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tab {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(127, 47, 31, 0.12);
      background: rgba(255, 250, 243, 0.78);
      cursor: pointer;
      font: inherit;
      color: var(--muted);
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    body[data-discipline="ot"] .tab {
      border-color: rgba(49, 82, 58, 0.12);
      background: rgba(250, 254, 247, 0.82);
    }

    .tab.active {
      color: #fff;
      background: linear-gradient(135deg, #704529, #3f2718);
      border-color: transparent;
    }

    body[data-discipline="ot"] .tab.active {
      background: linear-gradient(135deg, #48694f, #294031);
    }

    .output {
      min-height: 520px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(91, 65, 42, 0.12);
      background: var(--panel-strong);
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.72;
      transition: border-color 220ms ease, background 220ms ease;
    }

    body[data-discipline="ot"] .output {
      border-color: rgba(65, 88, 60, 0.12);
    }

    .status {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(179, 71, 47, 0.09);
      color: var(--accent-deep);
      font-size: 0.85rem;
      transition: background 220ms ease, color 220ms ease;
    }

    body[data-discipline="ot"] .pill {
      background: rgba(76, 122, 88, 0.1);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .field.two {
        grid-template-columns: 1fr;
      }

      .output {
        min-height: 360px;
      }
    }
  </style>
</head>
<body data-discipline="pt">
  <div class="shell">
    <section class="hero">
      <h1 id="hero-title">PT / OT Case Presentation App</h1>
      <p id="hero-description"></p>
      <div class="pill-row">
        <span class="pill">初期評価モード</span>
        <span class="pill">最終発表モード</span>
        <span class="pill">職種切り替え対応</span>
        <span class="pill">スライド案つき</span>
      </div>
    </section>

    <div class="grid">
      <section class="card panel">
        <h2 class="section-title">入力</h2>
        <div class="switch-stack">
          <div class="discipline-switch">
            <button id="discipline-pt" class="active" type="button">PT</button>
            <button id="discipline-ot" type="button">OT</button>
          </div>
          <div class="mode-switch">
            <button id="mode-initial" class="active" type="button">初期評価</button>
            <button id="mode-final" type="button">最終発表</button>
          </div>
        </div>

        <form id="case-form" class="form-grid">
          <div class="field two">
            <div>
              <label for="diagnosis">診断名</label>
              <input id="diagnosis" name="diagnosis">
            </div>
            <div>
              <label for="ageSex">年齢 / 性別</label>
              <input id="ageSex" name="ageSex">
            </div>
          </div>

          <div class="field two">
            <div>
              <label for="timing" id="label-timing">発症時期 / 術後時期</label>
              <input id="timing" name="timing">
            </div>
            <div>
              <label for="setting">生活・診療設定</label>
              <input id="setting" name="setting">
            </div>
          </div>

          <div class="field">
            <label for="chiefComplaint">主訴</label>
            <textarea id="chiefComplaint" name="chiefComplaint"></textarea>
          </div>

          <div class="field two">
            <div>
              <label for="patientGoal" id="label-patientGoal">患者目標</label>
              <textarea id="patientGoal" name="patientGoal"></textarea>
            </div>
            <div>
              <label for="therapistGoal" id="label-therapistGoal">療法士目標</label>
              <textarea id="therapistGoal" name="therapistGoal"></textarea>
            </div>
          </div>

          <div class="field">
            <label for="adl" id="label-adl">ADL / 活動制限</label>
            <textarea id="adl" name="adl"></textarea>
          </div>

          <div class="field">
            <label for="findings">主要所見</label>
            <textarea id="findings" name="findings"></textarea>
          </div>

          <div class="field">
            <label for="background" id="label-background">生活背景</label>
            <textarea id="background" name="background"></textarea>
          </div>

          <div class="field">
            <label for="precautions" id="label-precautions">注意点・禁忌</label>
            <textarea id="precautions" name="precautions"></textarea>
          </div>

          <div class="block" id="initial-fields">
            <h3 class="section-title">初期評価向け項目</h3>
            <div class="field">
              <label for="currentTreatment" id="label-currentTreatment">現在行っている治療</label>
              <textarea id="currentTreatment" name="currentTreatment"></textarea>
            </div>
            <div class="field">
              <label for="proposedPlan" id="label-proposedPlan">想定する治療方針</label>
              <textarea id="proposedPlan" name="proposedPlan"></textarea>
            </div>
          </div>

          <div class="block" id="final-fields" hidden>
            <h3 class="section-title">最終発表向け項目</h3>
            <div class="field">
              <label for="initialSummary">初期評価の要点</label>
              <textarea id="initialSummary" name="initialSummary"></textarea>
            </div>
            <div class="field">
              <label for="interventions" id="label-interventions">実施した治療</label>
              <textarea id="interventions" name="interventions"></textarea>
            </div>
            <div class="field two">
              <div>
                <label for="period" id="label-period">治療期間</label>
                <input id="period" name="period">
              </div>
              <div>
                <label for="frequency">頻度</label>
                <input id="frequency" name="frequency">
              </div>
            </div>
            <div class="field">
              <label for="progress">経過</label>
              <textarea id="progress" name="progress"></textarea>
            </div>
            <div class="field">
              <label for="reassessment">再評価結果</label>
              <textarea id="reassessment" name="reassessment"></textarea>
            </div>
            <div class="field two">
              <div>
                <label for="improved">改善した点</label>
                <textarea id="improved" name="improved"></textarea>
              </div>
              <div>
                <label for="remaining">残存問題</label>
                <textarea id="remaining" name="remaining"></textarea>
              </div>
            </div>
            <div class="field">
              <label for="nextSteps">今後の課題</label>
              <textarea id="nextSteps" name="nextSteps"></textarea>
            </div>
          </div>
        </form>

        <div class="action-row">
          <button id="generate" class="primary" type="button">生成する</button>
          <button id="load-example" class="secondary" type="button">サンプル入力</button>
          <button id="clear-form" class="ghost" type="button">クリア</button>
        </div>
        <p id="status" class="status">入力後に「生成する」を押すと、右側に結果が表示されます。</p>
      </section>

      <section class="card panel">
        <h2 class="section-title">出力</h2>
        <div class="output-tabs">
          <button class="tab active" type="button" data-tab="speech">発表本文</button>
          <button class="tab" type="button" data-tab="slides">スライド案</button>
          <button class="tab" type="button" data-tab="normalized">整理済み症例情報</button>
        </div>
        <div id="output" class="output"></div>
        <div class="output-actions" style="margin-top: 14px;">
          <button id="copy-output" class="primary" type="button">出力をコピー</button>
          <button id="download-output" class="secondary" type="button">Markdown保存</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    const copyFields = [

        buildSpeech(base, mode, helper) {
          if (mode === "initial") {
            const intro = helper.joinSentence([
              "本日、",
              base.diagnosis || "診断名未入力の症例",

          const closing = "以上より、本症例では作業療法介入により一定の改善を認めた一方、生活の中で安定して遂行するためには継続的な調整と支援が必要と考えました。今後も本人の希望する生活に近づけるよう支援を継続していきます。";

          return [
            "発表本文",
            intro,
            "",
            start,
            "",
            intervention,
            "",
            progress,
            "",
            reassessment,
            "",
            outcomes,
            "",
            discussion,
            "",
            next,
            "",
            closing
          ].join("\n");
        },
        buildSlides(mode) {
          if (mode === "initial") {
            return [
              "# 初期評価 スライド案",
              "",
              "1. 症例紹介",
              "2. 主訴と本人の希望",
              "3. 作業遂行上の課題",
              "4. 評価所見",
              "5. 問題点の整理",
              "6. 臨床推論",
              "7. 現在行っている作業療法",
              "8. 今後の支援方針",
              "9. まとめ"
            ].join("\n");
          }

          return [
            "# 最終発表 スライド案",
            "",
            "1. 症例紹介",
            "2. 初期評価のまとめ",
            "3. 問題点と介入方針",
            "4. 実施した作業療法",
            "5. 経過",
            "6. 再評価結果",
            "7. 改善点と残存課題",
            "8. 作業遂行・参加面の考察",
            "9. 今後の課題",
            "10. まとめ"
          ].join("\n");
        }
      }
    };

    const state = {
      discipline: "pt",
      mode: "initial",
      activeTab: "speech",
      outputs: {
        speech: "",
        slides: "",
        normalized: ""
      },
      drafts: {
        pt: {},
        ot: {}
      }
    };

    const heroTitleEl = document.getElementById("hero-title");
    const heroDescriptionEl = document.getElementById("hero-description");
    const outputEl = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const initialFieldsEl = document.getElementById("initial-fields");
    const finalFieldsEl = document.getElementById("final-fields");
    const fieldIds = copyFields;
    const fields = fieldIds.map((id) => document.getElementById(id));

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function line(label, val) {
      return `- ${label}: ${val || "未入力"}`;
    }

    function joinSentence(parts) {
      return parts.filter(Boolean).join("");
    }

    function currentConfig() {
      return config[state.discipline];
    }

    function currentData() {
      const data = {};
      fieldIds.forEach((id) => {
        data[id] = value(id);
      });
      return data;
    }

    function saveDraft() {
      state.drafts[state.discipline] = currentData();
    }

    function loadDraft(draft = {}) {
      fieldIds.forEach((id) => {
        const el = document.getElementById(id);
        el.value = draft[id] || "";
      });
    }

    function applyTextConfig() {
      const cfg = currentConfig();
      document.body.dataset.discipline = state.discipline;
      heroTitleEl.textContent = cfg.title;
      heroDescriptionEl.textContent = cfg.heroDescription;

      Object.entries(cfg.labels).forEach(([key, label]) => {
        const labelEl = document.getElementById(`label-${key}`);
        if (labelEl) {
          labelEl.textContent = label;
        }
      });

      Object.entries(cfg.placeholders).forEach(([key, placeholder]) => {
        const el = document.getElementById(key);
        if (el) {
          el.placeholder = placeholder;
        }
      });
    }

    function buildNormalized() {
      const base = currentData();
      const labels = currentConfig().normalizedLabels;
      if (state.mode === "initial") {
        return [
          "# 症例情報（整理済み）",
          "",
          "## 基本情報",
          line("診断名", base.diagnosis),
          line("年齢 / 性別", base.ageSex),
          line("発症時期 / 術後時期", base.timing),
          line("生活・診療設定", base.setting),
          "",
          "## 主訴と目標",
          line("主訴", base.chiefComplaint),
          line(labels.patientGoal, base.patientGoal),
          line(labels.therapistGoal, base.therapistGoal),
          "",
          `## ${state.discipline === "pt" ? "現在の状態" : "作業遂行上の状態"}`,
          line(labels.adl, base.adl),
          line("主要所見", base.findings),
          line(labels.background, base.background),
          line(labels.precautions, base.precautions),
          "",
          `## ${state.discipline === "pt" ? "治療情報" : "支援情報"}`,
          line(labels.currentTreatment, base.currentTreatment),
          line(labels.proposedPlan, base.proposedPlan)
        ].join("\n");
      }

      return [
        "# 症例情報（整理済み）",
        "",
        "## 基本情報",
        line("診断名", base.diagnosis),
        line("年齢 / 性別", base.ageSex),
        line("発症時期 / 術後時期", base.timing),
        line("生活・診療設定", base.setting),
        "",
        "## 初期状態",
        line("主訴", base.chiefComplaint),
        line(labels.patientGoal, base.patientGoal),
        line(labels.therapistGoal, base.therapistGoal),
        line(labels.adl, base.adl),
        line("主要所見", base.findings),
        line(labels.background, base.background),
        line(labels.precautions, base.precautions),
        "",
        `## ${state.discipline === "pt" ? "治療経過" : "介入経過"}`,
        line("初期評価の要点", base.initialSummary),
        line(labels.interventions, base.interventions),
        line(labels.period, base.period),
        line("頻度", base.frequency),
        line("経過", base.progress),
        line("再評価結果", base.reassessment),
        line("改善した点", base.improved),
        line("残存問題", base.remaining),
        line("今後の課題", base.nextSteps)
      ].join("\n");
    }

    function buildSpeech() {
      return currentConfig().buildSpeech(currentData(), state.mode, { joinSentence });
    }

    function buildSlides() {
      return currentConfig().buildSlides(state.mode);
    }

    function render() {
      state.outputs.normalized = buildNormalized();
      state.outputs.speech = buildSpeech();
      state.outputs.slides = buildSlides();
      outputEl.textContent = state.outputs[state.activeTab];
      const disciplineLabel = state.discipline === "pt" ? "PT" : "OT";
      statusEl.textContent = `${disciplineLabel} / ${state.mode === "initial" ? "初期評価" : "最終発表"}モードで出力を更新しました。`;
    }

    function setMode(mode) {
      state.mode = mode;
      document.getElementById("mode-initial").classList.toggle("active", mode === "initial");
      document.getElementById("mode-final").classList.toggle("active", mode === "final");
      initialFieldsEl.hidden = mode !== "initial";
      finalFieldsEl.hidden = mode !== "final";
      render();
    }

    function setDiscipline(discipline) {
      if (discipline === state.discipline) {
        return;
      }
      saveDraft();
      state.discipline = discipline;
      document.getElementById("discipline-pt").classList.toggle("active", discipline === "pt");
      document.getElementById("discipline-ot").classList.toggle("active", discipline === "ot");
      applyTextConfig();
      loadDraft(state.drafts[discipline]);
      render();
    }

    function setTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll(".tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tab);
      });
      outputEl.textContent = state.outputs[tab];
    }

    function fillForm(data) {
      fieldIds.forEach((id) => {
        const el = document.getElementById(id);
        el.value = data[id] || "";
      });
      saveDraft();
      render();
    }

    function clearForm() {
      fields.forEach((field) => {
        field.value = "";
      });
      saveDraft();
      render();
    }

    async function copyOutput() {
      try {
        await navigator.clipboard.writeText(state.outputs[state.activeTab]);
        statusEl.textContent = "現在の出力をクリップボードにコピーしました。";
      } catch (error) {
        statusEl.textContent = "コピーに失敗しました。ブラウザの権限設定を確認してください。";
      }
    }

    function downloadOutput() {
      const blob = new Blob([state.outputs[state.activeTab]], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const timestamp = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `${state.discipline}-case-presentation-${state.mode}-${state.activeTab}-${timestamp}.md`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      statusEl.textContent = "Markdownファイルを保存しました。";
    }

    document.getElementById("discipline-pt").addEventListener("click", () => setDiscipline("pt"));
    document.getElementById("discipline-ot").addEventListener("click", () => setDiscipline("ot"));
    document.getElementById("mode-initial").addEventListener("click", () => setMode("initial"));
    document.getElementById("mode-final").addEventListener("click", () => setMode("final"));
    document.getElementById("generate").addEventListener("click", render);
    document.getElementById("clear-form").addEventListener("click", clearForm);
    document.getElementById("load-example").addEventListener("click", () => {
      fillForm(currentConfig().examples[state.mode]);
      statusEl.textContent = "サンプル症例を読み込みました。";
    });
    document.getElementById("copy-output").addEventListener("click", copyOutput);
    document.getElementById("download-output").addEventListener("click", downloadOutput);
    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => setTab(button.dataset.tab));
    });

    applyTextConfig();
    loadDraft(state.drafts.pt);
    render();
  </script>
</body>
</html>
