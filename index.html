<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Sprint 3D</title>
  <style>
    :root {
      --bg-top: #7fc7ff;
      --bg-mid: #b9ebff;
      --bg-bottom: #f6fdff;
      --panel: rgba(10, 38, 68, 0.72);
      --panel-soft: rgba(255, 255, 255, 0.18);
      --text: #f7fbff;
      --accent: #ffd166;
      --accent-2: #ff7b54;
      --shadow: 0 24px 60px rgba(10, 38, 68, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Trebuchet MS", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.55), transparent 16%),
        radial-gradient(circle at 78% 10%, rgba(255, 255, 255, 0.42), transparent 14%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 16px;
      padding: 18px;
    }

    .card {
      min-width: 140px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(247, 251, 255, 0.8);
    }

    .value {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 700;
    }

    .subvalue {
      display: block;
      margin-top: 6px;
      font-size: 0.9rem;
      color: rgba(247, 251, 255, 0.78);
    }

    .brand {
      position: fixed;
      left: 18px;
      top: 106px;
      max-width: min(440px, calc(100vw - 36px));
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 0;
      line-height: 1.6;
      color: rgba(247, 251, 255, 0.92);
    }

    .controls {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(380px, calc(100vw - 36px));
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .controls strong {
      color: var(--accent);
    }

    .controls p {
      margin: 0;
      line-height: 1.7;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(6, 24, 42, 0.28);
      backdrop-filter: blur(3px);
      pointer-events: auto;
      transition: opacity 240ms ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .panel {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(9, 29, 51, 0.92), rgba(14, 49, 82, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.1rem);
    }

    .panel p {
      margin: 0 0 18px;
      line-height: 1.7;
      color: rgba(247, 251, 255, 0.9);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #12314f;
      background: linear-gradient(135deg, var(--accent), #ffe9a4);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
    }

    button.secondary {
      color: var(--text);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .mobile-buttons {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: none;
      gap: 10px;
      pointer-events: auto;
    }

    .mobile-buttons button {
      min-width: 72px;
      min-height: 56px;
      padding: 0 18px;
      font-size: 1.1rem;
    }

    @media (max-width: 860px) {
      .brand {
        top: auto;
        bottom: 106px;
      }

      .controls {
        left: 18px;
        right: 18px;
        max-width: none;
        bottom: 92px;
      }

      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="topbar">
      <div class="card">
        <span class="label">Score</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="card">
        <span class="label">Best</span>
        <span class="value" id="best">0</span>
      </div>
      <div class="card">
        <span class="label">Cloud Coins</span>
        <span class="value" id="coins">0</span>
        <span class="subvalue" id="status-text">走行中はPで一時停止</span>
      </div>
    </div>

    <section class="brand">
      <h1>Sky Sprint 3D</h1>
      <p>雲のコースを走り抜けるクラウドランナーです。前から飛んでくる岩やゲートをよけながら、どこまで進めるか挑戦できます。</p>
    </section>

    <section class="controls">
      <p><strong>操作方法</strong><br>左右移動: <strong>A / D</strong> または <strong>← / →</strong><br>ジャンプ: <strong>Space</strong> または <strong>↑</strong><br>一時停止: <strong>P</strong><br>再開: <strong>Enter</strong></p>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="overlay-title">雲の上を走ろう</h2>
      <p id="overlay-text">黄色いランナーを左右に動かして障害物をかわします。距離が伸びるほどスピードも少しずつ上がります。</p>
      <div class="actions">
        <button id="start-button">スタート</button>
        <button class="secondary" id="restart-button">リスタート</button>
      </div>
    </div>
  </div>

  <div class="mobile-buttons">
    <button data-action="left">◀</button>
    <button data-action="jump">▲</button>
    <button data-action="right">▶</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js";

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const coinsEl = document.getElementById("coins");
    const statusTextEl = document.getElementById("status-text");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const overlayText = document.getElementById("overlay-text");
    const startButton = document.getElementById("start-button");
    const restartButton = document.getElementById("restart-button");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xbfeeff, 16, 70);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5.2, 11.5);
    camera.lookAt(0, 1.3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x8ab3d9, 1.5);
    scene.add(hemi);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.35);
    sunLight.position.set(6, 12, 5);
    scene.add(sunLight);

    const world = new THREE.Group();
    scene.add(world);

    const lanePositions = [-3.2, 0, 3.2];
    const tempBox = new THREE.Box3();
    const tempPlayerBox = new THREE.Box3();
    const clock = new THREE.Clock();

    const gameState = {
      running: false,
      gameOver: false,
      speed: 12,
      score: 0,
      coins: 0,
      best: Number(localStorage.getItem("sky-sprint-best") || 0),
      lane: 1,
      jumpVelocity: 0,
      onGround: true,
      spawnTimer: 0,
      coinTimer: 0,
      cloudShift: 0,
      paused: false,
    };

    bestEl.textContent = gameState.best;

    const player = buildPlayer();
    player.position.set(0, 1.15, 0);
    world.add(player);

    const track = buildTrack();
    world.add(track);

    const farClouds = buildFarClouds();
    scene.add(farClouds);

    const obstacles = [];
    const coins = [];
    let introPulse = 0;

    function buildPlayer() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.48, 1.1, 6, 14),
        new THREE.MeshStandardMaterial({ color: 0xffd54a, roughness: 0.35, metalness: 0.05 })
      );
      body.castShadow = true;
      group.add(body);

      const visor = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 20, 20),
        new THREE.MeshStandardMaterial({ color: 0x1c4468, roughness: 0.25, metalness: 0.12 })
      );
      visor.position.set(0, 0.45, 0.36);
      group.add(visor);

      const legGeom = new THREE.BoxGeometry(0.2, 0.7, 0.2);
      const legMat = new THREE.MeshStandardMaterial({ color: 0xff7b54, roughness: 0.45 });
      const legLeft = new THREE.Mesh(legGeom, legMat);
      const legRight = legLeft.clone();
      legLeft.position.set(-0.18, -0.86, 0);
      legRight.position.set(0.18, -0.86, 0);
      group.add(legLeft, legRight);

      const armGeom = new THREE.BoxGeometry(0.18, 0.62, 0.18);
      const armMat = new THREE.MeshStandardMaterial({ color: 0xffb347, roughness: 0.4 });
      const armLeft = new THREE.Mesh(armGeom, armMat);
      const armRight = armLeft.clone();
      armLeft.position.set(-0.58, -0.1, 0);
      armRight.position.set(0.58, -0.1, 0);
      group.add(armLeft, armRight);

      group.userData = { legLeft, legRight, armLeft, armRight, body };
      return group;
    }

    function makeCloud(width, height, depth, color = 0xffffff) {
      const cloud = new THREE.Group();
      const material = new THREE.MeshStandardMaterial({ color, roughness: 0.9 });
      const pieces = [
        { x: 0, y: 0, z: 0, sx: 1.2, sy: 1, sz: 1.1 },
        { x: -0.9, y: 0.08, z: 0.25, sx: 0.95, sy: 0.85, sz: 0.9 },
        { x: 0.9, y: 0.12, z: -0.1, sx: 1, sy: 0.9, sz: 0.95 },
        { x: 0.2, y: 0.4, z: 0.12, sx: 0.9, sy: 0.85, sz: 0.85 },
      ];

      pieces.forEach((piece) => {
        const puff = new THREE.Mesh(new THREE.SphereGeometry(1, 18, 18), material);
        puff.position.set(piece.x * width, piece.y * height, piece.z * depth);
        puff.scale.set(piece.sx * width, piece.sy * height, piece.sz * depth);
        cloud.add(puff);
      });

      return cloud;
    }

    function buildTrack() {
      const group = new THREE.Group();

      for (let i = 0; i < 14; i += 1) {
        const laneCloud = makeCloud(2.1, 1.2, 1.5, 0xffffff);
        laneCloud.position.set(0, -0.1, -i * 4.2);
        laneCloud.scale.set(3.6, 1.1, 1.8);
        group.add(laneCloud);
      }

      const railMat = new THREE.MeshStandardMaterial({ color: 0x9ed8ff, roughness: 0.35, emissive: 0x3d8fd6, emissiveIntensity: 0.18 });
      for (const x of [-5.8, 5.8]) {
        const rail = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 62), railMat);
        rail.position.set(x, 0.35, -28);
        group.add(rail);
      }

      return group;
    }

    function buildFarClouds() {
      const group = new THREE.Group();
      for (let i = 0; i < 18; i += 1) {
        const cloud = makeCloud(1.4 + Math.random() * 1.8, 0.7 + Math.random() * 0.7, 1.1 + Math.random(), 0xfafcff);
        cloud.position.set((Math.random() - 0.5) * 42, 7 + Math.random() * 12, -Math.random() * 70);
        const scale = 1.4 + Math.random() * 2.2;
        cloud.scale.set(scale, scale * 0.7, scale);
        cloud.userData.floatOffset = Math.random() * Math.PI * 2;
        group.add(cloud);
      }
      return group;
    }

    function buildObstacle() {
      const laneIndex = Math.floor(Math.random() * lanePositions.length);
      const style = Math.random();
      const group = new THREE.Group();

      if (style < 0.4) {
        const rock = new THREE.Mesh(
          new THREE.DodecahedronGeometry(0.9, 0),
          new THREE.MeshStandardMaterial({ color: 0xff8552, roughness: 0.7 })
        );
        rock.scale.set(1, 1.2, 1);
        group.add(rock);
        group.userData.motion = "spin";
      } else {
        if (style < 0.78) {
          const postMat = new THREE.MeshStandardMaterial({ color: 0x4e6fa5, roughness: 0.45 });
          const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.22, 1.4, 0.22), postMat);
          const rightPost = leftPost.clone();
          leftPost.position.set(-0.75, 0.2, 0);
          rightPost.position.set(0.75, 0.2, 0);
          const bar = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.24, 0.24), postMat);
          bar.position.set(0, 0.8, 0);
          group.add(leftPost, rightPost, bar);
          group.userData.motion = "steady";
        } else {
          const stormMat = new THREE.MeshStandardMaterial({
            color: 0x6f86c9,
            roughness: 0.35,
            emissive: 0x2e4b9e,
            emissiveIntensity: 0.35
          });
          const core = new THREE.Mesh(new THREE.OctahedronGeometry(0.8, 0), stormMat);
          const ring = new THREE.Mesh(
            new THREE.TorusGeometry(1.15, 0.12, 12, 32),
            new THREE.MeshStandardMaterial({ color: 0xc8e6ff, roughness: 0.2, metalness: 0.25 })
          );
          ring.rotation.x = Math.PI / 2;
          group.add(core, ring);
          group.userData.motion = "sway";
        }
      }

      group.position.set(lanePositions[laneIndex], 1, -58);
      group.userData.laneIndex = laneIndex;
      group.userData.baseX = lanePositions[laneIndex];
      group.userData.phase = Math.random() * Math.PI * 2;
      scene.add(group);
      obstacles.push(group);
    }

    function buildCoinCluster() {
      const laneIndex = Math.floor(Math.random() * lanePositions.length);
      const cluster = new THREE.Group();
      const material = new THREE.MeshStandardMaterial({
        color: 0xffe27a,
        roughness: 0.25,
        metalness: 0.45,
        emissive: 0xe8a600,
        emissiveIntensity: 0.25
      });

      for (let i = 0; i < 3; i += 1) {
        const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.12, 24), material);
        coin.rotation.z = Math.PI / 2;
        coin.position.set(0, i * 0.72, 0);
        cluster.add(coin);
      }

      cluster.position.set(lanePositions[laneIndex], 1.3, -60);
      cluster.userData.laneIndex = laneIndex;
      cluster.userData.phase = Math.random() * Math.PI * 2;
      scene.add(cluster);
      coins.push(cluster);
    }

    function resetGame() {
      for (const obstacle of obstacles) {
        scene.remove(obstacle);
      }
      obstacles.length = 0;

      gameState.running = false;
      gameState.gameOver = false;
      gameState.speed = 12;
      gameState.score = 0;
      gameState.coins = 0;
      gameState.lane = 1;
      gameState.jumpVelocity = 0;
      gameState.onGround = true;
      gameState.spawnTimer = 0;
      gameState.coinTimer = 0.55;
      gameState.cloudShift = 0;
      gameState.paused = false;

      player.position.set(0, 1.15, 0);
      player.rotation.set(0, 0, 0);
      scoreEl.textContent = "0";
      coinsEl.textContent = "0";
      statusTextEl.textContent = "走行中はPで一時停止";
      updateTrack(0);

      for (const coin of coins) {
        scene.remove(coin);
      }
      coins.length = 0;

      overlay.classList.remove("hidden");
      overlayTitle.textContent = "雲の上を走ろう";
      overlayText.textContent = "黄色いランナーを左右に動かして障害物をかわします。コインを集めるとスコアが伸び、距離が伸びるほどスピードも少しずつ上がります。";
    }

    function startGame() {
      if (!gameState.gameOver && !gameState.paused) {
        gameState.score = 0;
      }
      gameState.running = true;
      gameState.gameOver = false;
      const resumedFromPause = gameState.paused;
      gameState.paused = false;
      statusTextEl.textContent = "走行中";
      overlay.classList.add("hidden");

      if (resumedFromPause) {
        overlayTitle.textContent = "一時停止";
      }
    }

    function endGame() {
      gameState.running = false;
      gameState.gameOver = true;
      gameState.paused = false;
      gameState.best = Math.max(gameState.best, Math.floor(gameState.score));
      localStorage.setItem("sky-sprint-best", String(gameState.best));
      bestEl.textContent = String(gameState.best);
      statusTextEl.textContent = "ゲームオーバー";
      overlay.classList.remove("hidden");
      overlayTitle.textContent = "ゲームオーバー";
      overlayText.textContent = `スコアは ${Math.floor(gameState.score)}、コインは ${gameState.coins} 枚でした。Enterキーかリスタートで再挑戦できます。`;
    }

    function tryJump() {
      if (!gameState.running || !gameState.onGround) {
        return;
      }
      gameState.jumpVelocity = 9.7;
      gameState.onGround = false;
    }

    function moveLane(direction) {
      gameState.lane = THREE.MathUtils.clamp(gameState.lane + direction, 0, 2);
    }

    function togglePause() {
      if (gameState.gameOver) {
        return;
      }

      if (!gameState.running && !gameState.paused) {
        return;
      }

      gameState.paused = !gameState.paused;
      gameState.running = !gameState.paused;

      if (gameState.paused) {
        statusTextEl.textContent = "一時停止中";
        overlay.classList.remove("hidden");
        overlayTitle.textContent = "一時停止";
        overlayText.textContent = "Pキーでもう一度再開できます。少し休んでから続けましょう。";
      } else {
        statusTextEl.textContent = "走行中";
        overlay.classList.add("hidden");
      }
    }

    function animatePlayer(delta, elapsed) {
      const targetX = lanePositions[gameState.lane];
      player.position.x = THREE.MathUtils.damp(player.position.x, targetX, 10, delta);

      gameState.jumpVelocity -= 22 * delta;
      player.position.y += gameState.jumpVelocity * delta;

      if (player.position.y <= 1.15) {
        player.position.y = 1.15;
        gameState.jumpVelocity = 0;
        gameState.onGround = true;
      }

      const runWave = gameState.running ? elapsed * 12 : introPulse;
      const { legLeft, legRight, armLeft, armRight, body } = player.userData;
      legLeft.rotation.x = Math.sin(runWave) * 0.85;
      legRight.rotation.x = Math.sin(runWave + Math.PI) * 0.85;
      armLeft.rotation.x = Math.sin(runWave + Math.PI) * 0.65;
      armRight.rotation.x = Math.sin(runWave) * 0.65;
      body.rotation.z = Math.sin(runWave) * 0.04;
      player.rotation.y = THREE.MathUtils.damp(player.rotation.y, (targetX - player.position.x) * 0.12, 10, delta);
    }

    function updateTrack(delta) {
      gameState.cloudShift += gameState.speed * delta;
      const segmentLength = 4.2;
      track.children.forEach((piece, index) => {
        if (index > 13) {
          return;
        }
        const looped = ((gameState.cloudShift + index * segmentLength) % (14 * segmentLength));
        piece.position.z = 4 - looped;
        piece.position.y = -0.1 + Math.sin((looped + index) * 0.25) * 0.06;
      });
    }

    function updateFarClouds(elapsed) {
      farClouds.children.forEach((cloud, index) => {
        cloud.position.x += Math.sin(elapsed * 0.15 + cloud.userData.floatOffset + index) * 0.0018;
        cloud.position.y += Math.sin(elapsed * 0.9 + cloud.userData.floatOffset) * 0.003;
      });
    }

    function updateObstacles(delta) {
      gameState.spawnTimer -= delta;
      const spawnDelay = THREE.MathUtils.clamp(1.35 - (gameState.speed - 12) * 0.035, 0.55, 1.35);
      if (gameState.spawnTimer <= 0) {
        buildObstacle();
        gameState.spawnTimer = spawnDelay;
      }

      for (let i = obstacles.length - 1; i >= 0; i -= 1) {
        const obstacle = obstacles[i];
        obstacle.position.z += gameState.speed * delta;
        obstacle.rotation.y += delta * 1.2;

        if (obstacle.userData.motion === "sway") {
          obstacle.position.x = obstacle.userData.baseX + Math.sin(clock.elapsedTime * 3.2 + obstacle.userData.phase) * 0.9;
          obstacle.position.y = 1.2 + Math.sin(clock.elapsedTime * 4.2 + obstacle.userData.phase) * 0.24;
        } else if (obstacle.userData.motion === "spin") {
          obstacle.rotation.x += delta * 2.6;
          obstacle.position.y = 1 + Math.sin(clock.elapsedTime * 5 + obstacle.userData.phase) * 0.12;
        }

        if (obstacle.position.z > 10) {
          scene.remove(obstacle);
          obstacles.splice(i, 1);
          continue;
        }

        tempPlayerBox.setFromObject(player);
        tempPlayerBox.min.y += 0.15;
        tempPlayerBox.max.y -= 0.1;
        tempBox.setFromObject(obstacle);

        if (tempPlayerBox.intersectsBox(tempBox)) {
          endGame();
          break;
        }
      }
    }

    function updateCoins(delta) {
      gameState.coinTimer -= delta;
      const spawnDelay = THREE.MathUtils.clamp(2.2 - (gameState.speed - 12) * 0.05, 1, 2.2);
      if (gameState.coinTimer <= 0) {
        buildCoinCluster();
        gameState.coinTimer = spawnDelay;
      }

      for (let i = coins.length - 1; i >= 0; i -= 1) {
        const cluster = coins[i];
        cluster.position.z += gameState.speed * delta;
        cluster.position.y = 1.3 + Math.sin(clock.elapsedTime * 4 + cluster.userData.phase) * 0.25;

        cluster.children.forEach((coin, index) => {
          coin.rotation.y += delta * (4 + index);
        });

        if (cluster.position.z > 10) {
          scene.remove(cluster);
          coins.splice(i, 1);
          continue;
        }

        tempPlayerBox.setFromObject(player);
        tempBox.setFromObject(cluster);

        if (tempPlayerBox.intersectsBox(tempBox)) {
          gameState.coins += 1;
          gameState.score += 18;
          coinsEl.textContent = String(gameState.coins);
          statusTextEl.textContent = `コイン ${gameState.coins} 枚`;
          scene.remove(cluster);
          coins.splice(i, 1);
        }
      }
    }

    function updateScore(delta) {
      gameState.score += delta * gameState.speed * 2.8;
      gameState.speed = 12 + Math.min(gameState.score / 45, 9);
      scoreEl.textContent = String(Math.floor(gameState.score));
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.033);
      const elapsed = clock.elapsedTime;
      introPulse += delta * 3;

      animatePlayer(delta, elapsed);
      updateFarClouds(elapsed);

      if (gameState.running) {
        updateTrack(delta);
        updateObstacles(delta);
        updateCoins(delta);
        updateScore(delta);
      } else {
        player.position.y = 1.15 + Math.sin(introPulse) * 0.08;
      }

      camera.position.x = THREE.MathUtils.damp(camera.position.x, player.position.x * 0.34, 4, delta);
      camera.lookAt(player.position.x * 0.15, 1.5, -1.2);

      renderer.render(scene, camera);
    }

    function handleAction(action) {
      if (action === "left") {
        moveLane(-1);
      } else if (action === "right") {
        moveLane(1);
      } else if (action === "jump") {
        tryJump();
      }
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "ArrowLeft" || event.code === "KeyA") {
        handleAction("left");
      }
      if (event.code === "ArrowRight" || event.code === "KeyD") {
        handleAction("right");
      }
      if (event.code === "ArrowUp" || event.code === "Space") {
        event.preventDefault();
        handleAction("jump");
      }
      if (event.code === "Enter") {
        if (gameState.gameOver) {
          resetGame();
        }
        startGame();
      }
      if (event.code === "KeyP") {
        togglePause();
      }
    }, { passive: false });

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("pointerdown", () => {
        handleAction(button.dataset.action);
      });
    });

    startButton.addEventListener("click", () => {
      if (gameState.gameOver) {
        resetGame();
      }
      startGame();
    });

    restartButton.addEventListener("click", () => {
      resetGame();
      startGame();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetGame();
    animate();
  </script>
</body>
</html>
